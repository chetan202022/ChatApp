config:
  target: "http://localhost:4002"

  phases:
    - duration: 60
      arrivalRate: 100

  engines:
    socketio-v3: {}

scenarios:
  - name: "Socket Load Test"
    engine: socketio-v3

    flow:
      - connect:
          query:
            userId: "test-user"

      - think: 2

      - emit:
          channel: "markSeen"
          data:
            senderId: "sender-test-id"

      - think: 2